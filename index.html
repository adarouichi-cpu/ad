<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
</head>
<body>
    <h1>Habit Tracker</h1>
    <form id="habit-form">
        <label for="habit-name">Habit Name:</label>
        <input type="text" id="habit-name" name="habit-name" required>
        <label for="habit-goal">Goal (daily):</label>
        <input type="number" id="habit-goal" name="habit-goal" required>
        <button type="submit">Add Habit</button>
    </form>
    <div id="habit-display">
        <h2>Your Habits</h2>
        <ul id="habit-list"></ul>
    </div>
    <section id="completion-score">
        <h2>Completion Score</h2>
        <p id="score-display">0</p>
    </section>
    <script>
        // JavaScript to handle form submission and display habits
    </script>
</body>
</html>
